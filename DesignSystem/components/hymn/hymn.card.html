<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:26px;color:var(--text-body);}
  .block{margin-bottom:26px;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin:0 0 12px;}
  .sheet{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;box-shadow:var(--shadow-inset);display:inline-block;}
  .row{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { ScriptureQuote, ChordSheet, WaveBars, StepDots, IconButton } = window.HinoAIDesignSystem_121ee1;
    function Demo(){
      const [play,setPlay] = React.useState(true);
      return (<div>
        <div class="block">
          <ScriptureQuote verse="Cantai ao Senhor um cântico novo." reference="Salmos 96:1" size="lg" halo />
        </div>
        <div class="block">
          <p class="lbl">Cifra</p>
          <div class="sheet">
            <ChordSheet section="Refrão" lines={[
              { chords: "G              C       D", text: "Cantai ao Senhor um cântico" },
              { chords: "Em           C        G", text: "novo, pois fez maravilhas" },
            ]} />
          </div>
        </div>
        <div class="block">
          <p class="lbl">Player &amp; progresso</p>
          <div class="row">
            <IconButton icon={play?'pause':'play'} variant="solid" size="lg" label="Tocar" onClick={()=>setPlay(p=>!p)} />
            <WaveBars playing={play} bars={28} height={40} />
            <StepDots total={3} current={2} />
          </div>
        </div>
      </div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body></html>

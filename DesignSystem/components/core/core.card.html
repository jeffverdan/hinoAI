<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px;color:var(--text-body);}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
  .lbl{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin:0 0 9px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, IconButton, Badge, Tag, Card, Avatar } = window.HinoAIDesignSystem_121ee1;
    function Demo(){
      const [sel,setSel] = React.useState('Gratidão');
      return (<div>
        <p class="lbl">Buttons</p>
        <div class="row">
          <Button iconLeft="sparkles">Criar meu hino</Button>
          <Button variant="secondary">Ouvir exemplo</Button>
          <Button variant="ghost" iconRight="chevronRight">Pular</Button>
          <Button variant="gold-soft">Ministério</Button>
          <Button disabled>Indisponível</Button>
        </div>
        <div class="row">
          <Button size="sm">Pequeno</Button>
          <Button size="md">Médio</Button>
          <Button size="lg" iconLeft="play">Tocar hino</Button>
        </div>
        <p class="lbl">Icon buttons</p>
        <div class="row">
          <IconButton icon="play" variant="solid" size="lg" label="Tocar" />
          <IconButton icon="heart" variant="outline" label="Favoritar" />
          <IconButton icon="share" label="Compartilhar" />
          <IconButton icon="download" label="Baixar" />
        </div>
        <p class="lbl">Badges &amp; tags</p>
        <div class="row">
          <Badge tone="gold">Ministério</Badge>
          <Badge tone="emotion" dot>Gratidão</Badge>
          <Badge tone="success">Pronto</Badge>
          <Badge tone="neutral">Rascunho</Badge>
          {['Gratidão','Esperança','Família','Cura'].map(t=>(
            <Tag key={t} selected={sel===t} onClick={()=>setSel(t)}>{t}</Tag>
          ))}
        </div>
        <p class="lbl">Cards &amp; avatar</p>
        <div class="row" style={{alignItems:'stretch'}}>
          <Card interactive style={{width:200}}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <Avatar name="Ana Lima" />
              <div><div style={{fontWeight:600,color:'var(--text-heading)'}}>Ana Lima</div><div style={{fontSize:13,color:'var(--text-muted)'}}>3 hinos</div></div>
            </div>
          </Card>
          <Card selected style={{width:200}}>
            <div style={{fontFamily:'var(--font-display)',fontSize:19,color:'var(--text-heading)'}}>Hino tradicional</div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>Solene · 4 vozes</div>
          </Card>
        </div>
      </div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body></html>

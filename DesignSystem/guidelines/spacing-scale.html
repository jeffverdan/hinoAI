<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px rhythm, 4px half-step" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px 24px;color:var(--text-body);}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .it{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--accent);border-radius:var(--radius-xs);width:22px;}
  .tk{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="it"><div class="bar" style="height:4px"></div><div class="tk">1·4</div></div>
    <div class="it"><div class="bar" style="height:8px"></div><div class="tk">2·8</div></div>
    <div class="it"><div class="bar" style="height:12px"></div><div class="tk">3·12</div></div>
    <div class="it"><div class="bar" style="height:16px"></div><div class="tk">4·16</div></div>
    <div class="it"><div class="bar" style="height:24px"></div><div class="tk">5·24</div></div>
    <div class="it"><div class="bar" style="height:32px"></div><div class="tk">6·32</div></div>
    <div class="it"><div class="bar" style="height:40px"></div><div class="tk">7·40</div></div>
    <div class="it"><div class="bar" style="height:48px"></div><div class="tk">8·48</div></div>
    <div class="it"><div class="bar" style="height:64px"></div><div class="tk">9·64</div></div>
  </div>
</body></html>

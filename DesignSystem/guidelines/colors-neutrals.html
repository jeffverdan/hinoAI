<!-- @dsCard group="Colors" viewport="700x150" name="Warm neutrals" subtitle="Brown-tinted ink scale — never cool gray" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px 24px;}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .cell{flex:1;height:64px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-family:var(--font-mono);font-size:10px;}
  .labels{display:flex;margin-top:8px;}
  .lb{flex:1;text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head>
<body>
  <div class="scale">
    <div class="cell" style="background:var(--ink-900);color:#e3d9c6">900</div>
    <div class="cell" style="background:var(--ink-800);color:#e3d9c6">800</div>
    <div class="cell" style="background:var(--ink-700);color:#e3d9c6">700</div>
    <div class="cell" style="background:var(--ink-600);color:#fff">600</div>
    <div class="cell" style="background:var(--ink-500);color:#fff">500</div>
    <div class="cell" style="background:var(--ink-400);color:#211c15">400</div>
    <div class="cell" style="background:var(--ink-300);color:#211c15">300</div>
    <div class="cell" style="background:var(--ink-200);color:#211c15">200</div>
    <div class="cell" style="background:var(--ink-100);color:#211c15">100</div>
  </div>
</body></html>

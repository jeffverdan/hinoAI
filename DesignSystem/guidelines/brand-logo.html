<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:0;}
  .grid{display:grid;grid-template-columns:1fr 1fr;}
  .pane{padding:30px 28px;display:flex;align-items:center;gap:16px;min-height:150px;}
  .light{background:var(--ivory-50);}
  .dark{background:var(--wash-sanctuary);}
  .lock{display:flex;align-items:center;gap:13px;}
  .word{font-family:var(--font-display);font-weight:600;font-size:34px;letter-spacing:-0.02em;line-height:1;}
  .ai{color:var(--gold-500);}
  img{display:block;}
</style></head>
<body>
  <div class="grid">
    <div class="pane light">
      <div class="lock">
        <img src="../assets/logo/hinoai-mark.svg" width="56" height="56" alt="Hino.AI">
        <span class="word" style="color:var(--night-800)">Hino<span class="ai">.AI</span></span>
      </div>
    </div>
    <div class="pane dark">
      <div class="lock">
        <img src="../assets/logo/hinoai-mark-outline.svg" width="56" height="56" alt="Hino.AI">
        <span class="word" style="color:var(--ivory-50)">Hino<span class="ai" style="color:var(--gold-400)">.AI</span></span>
      </div>
    </div>
  </div>
</body></html>

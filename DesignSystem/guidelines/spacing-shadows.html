<!-- @dsCard group="Spacing" viewport="700x176" name="Shadows & gold glow" subtitle="Warm-tinted elevation, never gray" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-subtle);padding:26px 24px;color:var(--text-body);}
  .row{display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .it{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .b{width:84px;height:60px;background:var(--surface-card);border-radius:var(--radius-md);}
  .tk{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="it"><div class="b" style="box-shadow:var(--shadow-sm)"></div><div class="tk">sm</div></div>
    <div class="it"><div class="b" style="box-shadow:var(--shadow-md)"></div><div class="tk">md</div></div>
    <div class="it"><div class="b" style="box-shadow:var(--shadow-lg)"></div><div class="tk">lg</div></div>
    <div class="it"><div class="b" style="box-shadow:var(--shadow-xl)"></div><div class="tk">xl</div></div>
    <div class="it"><div class="b" style="box-shadow:var(--glow-gold)"></div><div class="tk">glow-gold</div></div>
  </div>
</body></html>

<!-- @dsCard group="Colors" viewport="700x176" name="Brand colors" subtitle="Midnight blue · gold · warm ivory & cream" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px 24px;color:var(--text-body);}
  .row{display:flex;gap:18px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{width:118px;height:74px;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,0.04);}
  .nm{font-size:13px;font-weight:600;color:var(--text-heading);}
  .hx{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .tk{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--night-800)"></div><div class="nm">Midnight</div><div class="hx">#1a2438</div><div class="tk">--night-800</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="nm">Gold</div><div class="hx">#c9a14a</div><div class="tk">--gold-500</div></div>
    <div class="sw"><div class="chip" style="background:var(--cream-300)"></div><div class="nm">Cream</div><div class="hx">#e8dcc0</div><div class="tk">--cream-300</div></div>
    <div class="sw"><div class="chip" style="background:var(--ivory-50);border:1px solid var(--border)"></div><div class="nm">Ivory</div><div class="hx">#fdfaf3</div><div class="tk">--ivory-50</div></div>
    <div class="sw"><div class="chip" style="background:var(--ember-500)"></div><div class="nm">Ember</div><div class="hx">#cf5a3c</div><div class="tk">--ember-500</div></div>
  </div>
</body></html>

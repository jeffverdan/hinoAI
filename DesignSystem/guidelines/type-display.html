<!-- @dsCard group="Type" viewport="700x230" name="Display — Spectral" subtitle="Editorial serif for titles & hymn names" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px 26px;color:var(--text-heading);}
  .d{font-family:var(--font-display);line-height:var(--lh-display);letter-spacing:var(--ls-tight);margin:0 0 4px;}
  .meta{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);margin-bottom:14px;}
  .a{font-size:52px;font-weight:600;}
  .b{font-size:34px;font-weight:500;}
  .c{font-size:24px;font-weight:600;}
</style></head>
<body>
  <p class="d a">Um cântico novo</p>
  <p class="meta">Spectral 600 · --fs-display-xl / 56</p>
  <p class="d b">Conte sua história</p>
  <p class="meta">Spectral 500 · --fs-display-md / 34</p>
  <p class="d c">Seu hino está pronto</p>
  <p class="meta">Spectral 600 · --fs-title / 24</p>
</body></html>

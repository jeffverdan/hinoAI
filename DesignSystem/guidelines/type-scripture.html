<!-- @dsCard group="Type" viewport="700x180" name="Scripture — italic Spectral" subtitle="The signature verse treatment" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--wash-dawn);padding:30px 28px;color:var(--text-heading);position:relative;}
  .halo{position:absolute;inset:0;background:var(--wash-halo);pointer-events:none;}
  .v{position:relative;font-family:var(--font-serif);font-style:italic;font-weight:500;font-size:30px;line-height:1.3;max-width:560px;margin:0 0 12px;color:var(--night-800);}
  .ref{position:relative;font-family:var(--font-sans);font-size:13px;font-weight:600;letter-spacing:0.04em;color:var(--accent-ink);}
</style></head>
<body>
  <div class="halo"></div>
  <p class="v">"Cantai ao Senhor um cântico novo."</p>
  <p class="ref">— Salmos 96:1</p>
</body></html>

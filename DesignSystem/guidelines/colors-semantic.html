<!-- @dsCard group="Colors" viewport="700x172" name="Semantic colors" subtitle="Accent · emotion · success · warning · danger" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px 24px;color:var(--text-body);}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:7px;align-items:flex-start;}
  .chip{width:96px;height:50px;border-radius:var(--radius-sm);box-shadow:var(--shadow-xs);display:flex;gap:5px;align-items:center;justify-content:center;}
  .dot{width:14px;height:14px;border-radius:50%;}
  .nm{font-size:12px;font-weight:600;color:var(--text-heading);}
  .tk{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent-soft)"><span class="dot" style="background:var(--accent)"></span></div><div class="nm">Accent</div><div class="tk">--accent</div></div>
    <div class="sw"><div class="chip" style="background:var(--emotion-soft)"><span class="dot" style="background:var(--emotion)"></span></div><div class="nm">Emotion</div><div class="tk">--emotion</div></div>
    <div class="sw"><div class="chip" style="background:var(--success-soft)"><span class="dot" style="background:var(--success)"></span></div><div class="nm">Success</div><div class="tk">--success</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning-soft)"><span class="dot" style="background:var(--warning)"></span></div><div class="nm">Warning</div><div class="tk">--warning</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger-soft)"><span class="dot" style="background:var(--danger)"></span></div><div class="nm">Danger</div><div class="tk">--danger</div></div>
  </div>
</body></html>

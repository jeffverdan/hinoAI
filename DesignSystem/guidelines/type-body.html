<!-- @dsCard group="Type" viewport="700x232" name="Body & labels — Figtree" subtitle="Warm humanist sans for all UI text" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px 26px;color:var(--text-body);}
  .lg{font-size:18px;line-height:var(--lh-body);max-width:560px;margin:0 0 14px;}
  .bd{font-size:16px;line-height:var(--lh-body);color:var(--text-muted);max-width:560px;margin:0 0 16px;}
  .ov{font-size:11px;font-weight:700;letter-spacing:var(--ls-overline);text-transform:uppercase;color:var(--accent-ink);margin:0 0 6px;}
  .cap{font-size:12px;color:var(--text-faint);}
</style></head>
<body>
  <p class="ov">Passo 2 de 3</p>
  <p class="lg" style="color:var(--text-heading);font-weight:600">Figtree 600 — 18px lead</p>
  <p class="bd">Conte um momento de fé e nós transformamos em louvor. Texto de corpo em Figtree 400 a 16px com entrelinha 1.6 — caloroso, legível e tranquilo.</p>
  <p class="cap">Caption · 12px · --text-faint</p>
</body></html>

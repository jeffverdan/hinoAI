<!-- @dsCard group="Colors" viewport="700x190" name="Sanctuary (dark) theme" subtitle="data-theme=sanctuary — the player & reveal" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);padding:0;}
  .stage{background:var(--wash-sanctuary);padding:24px 26px;border-radius:0;min-height:142px;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{width:104px;height:56px;border-radius:var(--radius-sm);}
  .nm{font-size:11.5px;font-weight:600;color:var(--text-heading);}
  .tk{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}
  .head{font-family:var(--font-display);font-size:22px;color:var(--text-heading);margin:0 0 16px;}
  em{color:var(--accent);font-style:italic;}
</style></head>
<body data-theme="sanctuary">
  <div class="stage" data-theme="sanctuary">
    <p class="head">Um <em>cântico novo</em></p>
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--surface-raised);border:1px solid var(--border)"></div><div class="nm">Surface</div><div class="tk">--surface-raised</div></div>
      <div class="sw"><div class="chip" style="background:var(--surface-card);border:1px solid var(--border)"></div><div class="nm">Card (4%)</div><div class="tk">--surface-card</div></div>
      <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="nm">Accent</div><div class="tk">--accent</div></div>
      <div class="sw"><div class="chip" style="background:var(--emotion)"></div><div class="nm">Emotion</div><div class="tk">--emotion</div></div>
    </div>
  </div>
</body></html>

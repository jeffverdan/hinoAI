<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="xs → pill, gently rounded" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px 24px;color:var(--text-body);}
  .row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;}
  .it{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .b{width:74px;height:60px;background:var(--surface-card);border:1.5px solid var(--border-gold);box-shadow:var(--shadow-sm);}
  .tk{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="it"><div class="b" style="border-radius:var(--radius-xs)"></div><div class="tk">xs · 4</div></div>
    <div class="it"><div class="b" style="border-radius:var(--radius-sm)"></div><div class="tk">sm · 8</div></div>
    <div class="it"><div class="b" style="border-radius:var(--radius-md)"></div><div class="tk">md · 12</div></div>
    <div class="it"><div class="b" style="border-radius:var(--radius-lg)"></div><div class="tk">lg · 18</div></div>
    <div class="it"><div class="b" style="border-radius:var(--radius-xl)"></div><div class="tk">xl · 26</div></div>
    <div class="it"><div class="b" style="border-radius:var(--radius-pill)"></div><div class="tk">pill</div></div>
  </div>
</body></html>

<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:22px 24px;color:var(--text-body);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .it{background:var(--surface-card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:11px 14px;}
  .k{font-size:10px;font-weight:700;letter-spacing:var(--ls-overline);text-transform:uppercase;color:var(--text-faint);margin:0 0 4px;}
  .v{font-size:14.5px;color:var(--text-heading);margin:0;}
  .no{border-left-color:var(--ink-300);}
  .no .v{color:var(--text-faint);text-decoration:line-through;}
</style></head>
<body>
  <div class="grid">
    <div class="it"><p class="k">CTA principal</p><p class="v">Criar meu hino</p></div>
    <div class="it"><p class="k">Gerando</p><p class="v">Compondo seu hino… leva cerca de um minuto.</p></div>
    <div class="it"><p class="k">Vazio</p><p class="v">Seu hinário começa aqui. Conte o primeiro testemunho.</p></div>
    <div class="it"><p class="k">Erro (gentil)</p><p class="v">Algo não saiu como esperávamos. Vamos tentar de novo?</p></div>
    <div class="it no"><p class="k">Evite</p><p class="v">CLIQUE AQUI AGORA!! 🎉🔥</p></div>
    <div class="it"><p class="k">Prefira</p><p class="v">Ouvir um exemplo</p></div>
  </div>
</body></html>
